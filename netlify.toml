[build]
  command = "npm install --prefix backend && cd frontend && npm install && npm run build"
  publish = "frontend/dist"
  functions = "backend"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[functions]
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"
